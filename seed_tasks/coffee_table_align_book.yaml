id: coffee_table.align_book
language: "Rotate the black book so its spine faces the robot."

arena:
  name: coffee_table

robot:
  name: panda
  controller: OSC_POSE

cameras: [agentview, robot0_eye_in_hand]
camera_height: 128
camera_width: 128
camera_depth: false

objects:
  - { id: black_book, asset: black_book }

inits:
  - black_book: [0.05, 0.00, 0.43, 0, 0, 0, 1]
  - black_book: [0.08, 0.05, 0.43, 0, 0, 0.3827, 0.9239]   # ~45 deg yaw

default_init_index: 0

success:
  predicate: oriented_like
  args:
    obj: black_book
    quat: [0, 0, 0.7071, 0.7071]   # 90 deg yaw, xyzw
    tol_deg: 20

horizon: 300

metadata:
  suite: orientation_control
  difficulty: medium
