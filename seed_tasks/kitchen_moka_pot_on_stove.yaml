id: kitchen.moka_pot_on_stove
language: "Place the moka pot on top of the stove."

arena:
  name: kitchen

robot:
  name: panda
  controller: OSC_POSE

cameras: [agentview, robot0_eye_in_hand]
camera_height: 128
camera_width: 128
camera_depth: false

objects:
  - { id: moka_pot,   asset: moka_pot }
  - { id: flat_stove, asset: flat_stove }

inits:
  - moka_pot:   [-0.10, -0.20, 0.93, 0, 0, 0, 1]
    flat_stove: [ 0.05,  0.15, 0.92, 0, 0, 0, 1]
  - moka_pot:   [-0.05, -0.25, 0.93, 0, 0, 0, 1]
    flat_stove: [ 0.05,  0.10, 0.92, 0, 0, 0, 1]

default_init_index: 0

success:
  predicate: on_top_of
  args:
    obj: moka_pot
    surface: flat_stove
    xy_tol: 0.12
    z_min: 0.02
    z_max: 0.25

horizon: 500

metadata:
  suite: kitchen_placement
  difficulty: medium
